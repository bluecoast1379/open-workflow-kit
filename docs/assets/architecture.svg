<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">Open Workflow Kit architecture and evidence flow</title>
  <desc id="desc">Five numbered stages flow from the tool-independent workflow core through a frozen completion contract, owner-authorized execution, the evidence ledger and human acceptance. Seven tool adapters consume the same core.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#070B14"/><stop offset="1" stop-color="#0B1220"/></linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#6D7CFF"/><stop offset="1" stop-color="#48D7FF"/></linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0l12 6-12 6z" fill="#48D7FF"/></marker>
  </defs>
  <rect width="1440" height="900" rx="32" fill="url(#bg)"/>
  <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="72" y="92" fill="#F8FAFC" font-size="52" font-weight="750">Architecture · one evidence path</text>
    <text x="72" y="136" fill="#A7B0C0" font-size="24">工具入口可以不同，完成口径与证据状态只有一套。</text>

    <g transform="translate(72 198)">
      <rect width="1296" height="116" rx="24" fill="#111A2C" stroke="#27344C"/>
      <text x="32" y="44" fill="#48D7FF" font-size="18" font-weight="700">PROJECT-LEVEL ADAPTERS</text>
      <text x="32" y="82" fill="#F8FAFC" font-size="24" font-weight="650">Codex · Claude Code · Cursor · GitHub Copilot · CodeBuddy · Kiro · Trae</text>
      <text x="1012" y="64" fill="#A7B0C0" font-size="20">generated from the same manifest</text>
    </g>

    <path d="M720 314v66" stroke="url(#line)" stroke-width="5" marker-end="url(#arrow)"/>

    <g transform="translate(72 392)">
      <g>
        <rect width="224" height="280" rx="24" fill="#111A2C" stroke="#6D7CFF" stroke-width="2"/>
        <circle cx="42" cy="44" r="24" fill="#6D7CFF"/><text x="42" y="52" text-anchor="middle" fill="#070B14" font-size="22" font-weight="800">1</text>
        <text x="28" y="98" fill="#F8FAFC" font-size="25" font-weight="700">Workflow Core</text>
        <text x="28" y="136" fill="#A7B0C0" font-size="18">Commands</text><text x="28" y="166" fill="#A7B0C0" font-size="18">Rules &amp; policies</text><text x="28" y="196" fill="#A7B0C0" font-size="18">Schemas</text><text x="28" y="226" fill="#A7B0C0" font-size="18">Capability catalog</text>
      </g>
      <path d="M232 140h46" stroke="#48D7FF" stroke-width="4" marker-end="url(#arrow)"/>
      <g transform="translate(284)">
        <rect width="224" height="280" rx="24" fill="#111A2C" stroke="#6D7CFF" stroke-width="2"/>
        <circle cx="42" cy="44" r="24" fill="#6D7CFF"/><text x="42" y="52" text-anchor="middle" fill="#070B14" font-size="22" font-weight="800">2</text>
        <text x="28" y="98" fill="#F8FAFC" font-size="25" font-weight="700">Frozen Contract</text>
        <text x="28" y="136" fill="#A7B0C0" font-size="18">Scope &amp; invariants</text><text x="28" y="166" fill="#A7B0C0" font-size="18">Stable AC IDs</text><text x="28" y="196" fill="#A7B0C0" font-size="18">Oracle specs</text><text x="28" y="226" fill="#A7B0C0" font-size="18">Quality budgets</text>
      </g>
      <path d="M516 140h46" stroke="#48D7FF" stroke-width="4" marker-end="url(#arrow)"/>
      <g transform="translate(568)">
        <rect width="224" height="280" rx="24" fill="#111A2C" stroke="#48D7FF" stroke-width="2"/>
        <circle cx="42" cy="44" r="24" fill="#48D7FF"/><text x="42" y="52" text-anchor="middle" fill="#070B14" font-size="22" font-weight="800">3</text>
        <text x="28" y="98" fill="#F8FAFC" font-size="25" font-weight="700">Bound Runner</text>
        <text x="28" y="136" fill="#A7B0C0" font-size="18">Owner permit</text><text x="28" y="166" fill="#A7B0C0" font-size="18">Command identity</text><text x="28" y="196" fill="#A7B0C0" font-size="18">Time &amp; diff budgets</text><text x="28" y="226" fill="#A7B0C0" font-size="18">Scope enforcement</text>
      </g>
      <path d="M800 140h46" stroke="#48D7FF" stroke-width="4" marker-end="url(#arrow)"/>
      <g transform="translate(852)">
        <rect width="224" height="280" rx="24" fill="#111A2C" stroke="#48D7FF" stroke-width="2"/>
        <circle cx="42" cy="44" r="24" fill="#48D7FF"/><text x="42" y="52" text-anchor="middle" fill="#070B14" font-size="22" font-weight="800">4</text>
        <text x="28" y="98" fill="#F8FAFC" font-size="25" font-weight="700">Evidence Ledger</text>
        <text x="28" y="136" fill="#A7B0C0" font-size="18">Append-only entries</text><text x="28" y="166" fill="#A7B0C0" font-size="18">HMAC attestation</text><text x="28" y="196" fill="#A7B0C0" font-size="18">Fresh fingerprints</text><text x="28" y="226" fill="#A7B0C0" font-size="18">Reproducible status</text>
      </g>
      <path d="M1084 140h46" stroke="#48D7FF" stroke-width="4" marker-end="url(#arrow)"/>
      <g transform="translate(1136)">
        <rect width="160" height="280" rx="24" fill="#111A2C" stroke="#A7B0C0" stroke-width="2"/>
        <circle cx="42" cy="44" r="24" fill="#F8FAFC"/><text x="42" y="52" text-anchor="middle" fill="#070B14" font-size="22" font-weight="800">5</text>
        <text x="24" y="98" fill="#F8FAFC" font-size="23" font-weight="700">Human Gate</text>
        <text x="24" y="136" fill="#A7B0C0" font-size="17">READY first</text><text x="24" y="166" fill="#A7B0C0" font-size="17">Owner rubric</text><text x="24" y="196" fill="#A7B0C0" font-size="17">External anchor</text><text x="24" y="226" fill="#A7B0C0" font-size="17">ACCEPTED later</text>
      </g>
    </g>

    <g transform="translate(72 720)">
      <rect width="1296" height="106" rx="22" fill="#0E1728" stroke="#27344C"/>
      <text x="28" y="44" fill="#A7B0C0" font-size="18" font-weight="700">STATE BOUNDARY</text>
      <text x="28" y="78" fill="#F8FAFC" font-size="22">INCOMPLETE → READY_FOR_HUMAN_ACCEPTANCE → ACCEPTED → RELEASED</text>
      <text x="866" y="62" fill="#48D7FF" font-size="19">Input changes make prior evidence STALE</text>
    </g>
  </g>
</svg>
