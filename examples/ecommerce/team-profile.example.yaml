schema_version: "1.2"
generated_at: "2026-06-05T00:00:00.000Z"
generated_by: "agent-workflow-init (ecommerce example)"

# Example profile for an ecommerce team that runs both a customer-facing
# storefront and a backoffice for merchants. Replace placeholders before use.

team:
  name: "Example Storefront Team"
  business_definition: "Direct-to-consumer storefront and merchant backoffice."
  target_users:
    - "shopper"
    - "merchant operator"
    - "fulfillment partner"

industries:
  - ecommerce

enabled_tools:
  - codex
  - claude
  - cursor
  - copilot

detected_tools: []

source_materials:
  business_intro:
    label: "业务介绍"
    status: "provided_by_user"
    paths:
      - "docs/product/overview.md"
  project_docs:
    label: "项目资料"
    status: "provided_by_user"
    paths:
      - "docs/product/"
      - "docs/merchant-runbook.md"
  ui_specs:
    label: "UI 设计文件"
    status: "provided_by_user"
    paths:
      - "docs/design/storefront-tokens.md"
      - "docs/design/backoffice-tokens.md"
  frontend_rules:
    label: "前端开发规范"
    status: "provided_by_user"
    paths:
      - "docs/frontend-rules.md"
  backend_rules:
    label: "后端开发规范"
    status: "provided_by_user"
    paths:
      - "docs/backend-rules.md"
  testing_rules:
    label: "测试规范"
    status: "provided_by_user"
    paths:
      - "docs/testing-rules.md"

repos:
  - path: "apps/storefront"
    marker: "node"
    tech_stack:
      - "node"
      - "react"
      - "next"
      - "typescript"
    family: "frontend-web"
    role: "customer storefront"
  - path: "apps/backoffice"
    marker: "node"
    tech_stack:
      - "node"
      - "vue"
      - "typescript"
    family: "frontend-web"
    role: "merchant backoffice"
  - path: "services/catalog"
    marker: "node"
    tech_stack:
      - "node"
      - "typescript"
    family: "backend-service"
    role: "catalog and search"
  - path: "services/orders"
    marker: "node"
    tech_stack:
      - "node"
      - "typescript"
    family: "backend-service"
    role: "order lifecycle"
  - path: "services/payments"
    marker: "node"
    tech_stack:
      - "node"
      - "typescript"
    family: "backend-service"
    role: "payment integration"

branch_model:
  type: "gitflow"
  production_branch: "main"
  integration_branch: "develop"
  feature_branch_rule: "feature/{ticket}-{slug}"
  worktree_dir: "_worktrees"

# 分级执行策略：详见 workflow/core/execution-policy.md
execution_policy:
  requested_default_mode: "ask"
  requested_categories:
    remote_git: { mode: "ask" }
    branch_creation: { mode: "ask" }
    push_tag_merge: { mode: "ask" }
    protected_branch_write: { mode: "ask" }
    db_ddl: { mode: "ask" }
    db_dml: { mode: "ask" }
    production_config_write: { mode: "ask" }
    build_deploy_trigger: { mode: "ask" }
    package_publish: { mode: "ask" }
    config_write: { mode: "ask" }
  external_trust_policy: { required_for_auto: true, source_env: "OPEN_WORKFLOW_TRUST_POLICY" }
  non_repo_auto_categories: ["protected_branch_write", "db_ddl", "db_dml", "production_config_write", "build_deploy_trigger", "package_publish"]
  risk_statement_required: true
  audit_log: "workflow/local/execution-audit.jsonl"

toolchain:
  runtime_logs: { label: "运行日志", detected: false, tools: [], evidence: [], status: "pending-question" }
  ci_cd: { label: "CI/CD 流水线", detected: false, tools: [], evidence: [], status: "pending-question" }
  deploy_runtime: { label: "部署运行态", detected: false, tools: [], evidence: [], status: "pending-question" }
  config_center: { label: "配置中心", detected: false, tools: [], evidence: [], status: "pending-question" }
  database: { label: "数据库查询", detected: false, tools: [], evidence: [], status: "pending-question" }
  git_platform: { label: "代码托管平台", detected: false, tools: [], evidence: [], status: "pending-question" }

testing:
  api_track:
    credentials_file: "workflow/local/test-credentials.env"
    environment_allowlist: []
    production_targets: "blocked"
  ui_track:
    browser_automation: "<TODO: playwright-mcp | 工具内置 | none>"
    miniprogram_automation: "disabled"
    evidence_dir: "features/{feature}/screenshots"

risk_policy:
  high_risk_files:
    - "ci/**"
    - "deploy/**"
    - "*.env*"
    - "infra/**"
    - "package.json"
    - "lockfiles"
    - "openapi/**"
    - "payments/config/**"

workflow:
  features_dir: "features"
  core_dir: "workflow/core"
  adapters_dir: "workflow/adapters"
  require_stage_gate_for_code: true
  require_feature_branch_for_code: true
  same_repo_parallel_policy: "worktree-required-after-implementation-stage"

# Ecommerce teams should prioritize release safety, contract tracing
# (between catalog/orders/payments), and UI baseline review for the storefront.
enabled_capabilities:
  - branch-gatekeeper
  - release-safety-checker
  - prd-code-diff-checker
  - contract-tracer
  - ui-baseline-reviewer
  - security-reviewer
  - test-evidence-reviewer
