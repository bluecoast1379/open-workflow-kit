    stages: ["03-技术架构"]
    applies_when: { any_keywords: ["仓库", "基线", "分支", "现有代码"], contract_paths: ["scope.repos"] }
    required_inputs: ["team-profile repos", "local Git metadata"]
    executor: "agent"
    blocking: true
    evidence_types: ["repo-baseline", "dirty-status", "fact-source-report"]

  - id: "impact-scope-analyzer"
    tier: "recommended"
    stages: ["03-技术架构"]
