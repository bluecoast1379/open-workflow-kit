    required_inputs: ["failure model", "RTO/RPO", "recovery plan", "fault evidence"]
    executor: "external"
    blocking: true
    evidence_types: ["fault-injection", "restore-test", "RTO-RPO-report"]

  - id: "observability-operability-checker"
    tier: "recommended"
