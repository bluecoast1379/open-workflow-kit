  - id: "ai-quality-evaluator"
    tier: "recommended"
    stages: ["02-产品文档", "03-技术架构", "06-测试用例", "07-测试执行", "12-复盘总结"]
    applies_when: { any_keywords: ["LLM", "模型", "prompt", "RAG", "agent", "生成式 AI"], contract_paths: ["domain.ai_system", "quality_budgets.ai_quality"] }
