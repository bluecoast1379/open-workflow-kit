    applies_when: { any_keywords: ["UI", "UX", "页面", "广告", "订阅", "通知"], contract_paths: ["domain.user_journeys", "quality_budgets.ux", "quality_budgets.accessibility"] }
    required_inputs: ["user journeys", "UI baseline", "human rubric"]
    executor: "agent"
    blocking: true
    evidence_types: ["task-rubric", "state-matrix", "accessibility-report"]

  - id: "performance-cost-budget-checker"
    tier: "recommended"
    stages: ["02-产品文档", "03-技术架构", "06-测试用例", "07-测试执行", "12-复盘总结"]
    applies_when: { any_keywords: ["性能", "延迟", "吞吐", "容量", "成本", "LLM"], contract_paths: ["quality_budgets.performance", "quality_budgets.cost"] }
    required_inputs: ["load model", "quality budgets", "benchmark evidence"]
