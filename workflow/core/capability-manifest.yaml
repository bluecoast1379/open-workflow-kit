  - id: "reversibility-evolution-checker"
    tier: "recommended"
    stages: ["02-产品文档", "03-技术架构", "05-代码审查", "07-测试执行", "11-上线邮件通知", "12-复盘总结"]
    applies_when: { any_keywords: ["迁移", "回滚", "兼容", "灰度", "下线", "schema"], contract_paths: ["quality_budgets.reversibility", "domain.compatibility", "governance.rollback"] }
    required_inputs: ["rollout plan", "migration plan", "consumer inventory", "rollback evidence"]
    executor: "agent"
    blocking: true
