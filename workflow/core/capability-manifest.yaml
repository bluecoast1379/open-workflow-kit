schema_version: "1.0"
manifest_version: "1.0.0"
capability_count: 31

activation:
  essential: "always-required"
  recommended: "required-when-applicable"
  optional: "explicit-or-policy-pack"
  match_semantics: "A recommended capability becomes required when any applies_when keyword matches the request/diff or any listed contract path is populated."
  no_silent_downgrade: true

capabilities:
  - id: "definition-quality-linter"
    tier: "essential"
    stages: ["define-done", "01-需求讨论", "02-产品文档", "03-技术架构"]
    applies_when: { any_keywords: ["需求", "PRD", "完成定义", "acceptance"], contract_paths: ["acceptance", "scope", "quality_budgets"] }
    required_inputs: ["completion/contract.yaml", "team-profile.yaml", "stage documents"]
    executor: "agent"
    blocking: true
    evidence_types: ["lint-report", "traceability-matrix"]

  - id: "evidence-freshness-checker"
    tier: "essential"
    stages: ["07-测试执行", "08-验收表格", "09-验收", "deliver-until-done"]
    applies_when: { any_keywords: ["测试通过", "证据", "验收", "完成"], contract_paths: ["acceptance", "governance.evidence_freshness"] }
    required_inputs: ["completion/contract.yaml", "completion/evidence/ledger.jsonl", "current fingerprints"]
    executor: "agent"
    blocking: true
    evidence_types: ["freshness-report", "invalidation-record"]

  - id: "autonomy-anti-cheating-guard"
    tier: "essential"
    stages: ["04-代码实现", "05-代码审查", "07-测试执行", "deliver-until-done"]
    applies_when: { any_keywords: ["自主", "直到完成", "修复", "agent"], contract_paths: ["autonomy", "governance.anti_cheating"] }
    required_inputs: ["frozen completion contract", "source diff", "test diff", "run-state"]
    executor: "agent"
    blocking: true
    evidence_types: ["contract-drift-report", "test-weakening-report", "budget-report"]

  - id: "branch-gatekeeper"
    tier: "essential"
    stages: ["04-代码实现", "04A-前端代码实现", "04B-后端代码实现", "deliver-until-done"]
    applies_when: { any_keywords: ["实现", "代码", "迁移", "配置"], contract_paths: ["scope.repos", "scope.allowed_paths"] }
    required_inputs: ["team-profile.yaml#branch_model", "repository status", "workflow status"]
    executor: "agent"
    blocking: true
    evidence_types: ["branch-gate-report", "worktree-status"]

  - id: "release-safety-checker"
    tier: "essential"
    stages: ["05-代码审查", "07-测试执行", "11-上线邮件通知"]
    applies_when: { any_keywords: ["发布", "release", "部署", "上线"], contract_paths: ["governance.release", "scope.repos"] }
    required_inputs: ["team-profile.yaml#branch_model", "release candidate", "production baseline", "completion evidence"]
    executor: "agent"
    blocking: true
    evidence_types: ["release-diff", "commit-lineage", "scope-report"]

  - id: "prd-code-diff-checker"
    tier: "essential"
    stages: ["04-代码实现", "04A-前端代码实现", "04B-后端代码实现", "05-代码审查"]
    applies_when: { any_keywords: ["实现", "diff", "审查"], contract_paths: ["requirements", "acceptance"] }
    required_inputs: ["PRD", "technical architecture", "completion contract", "source diff"]
    executor: "agent"
    blocking: true
    evidence_types: ["requirement-diff-map", "scope-drift-report"]

  - id: "contract-tracer"
    tier: "essential"
    stages: ["03-技术架构", "05-代码审查"]
    applies_when: { any_keywords: ["API", "事件", "字段", "跨服务", "契约"], contract_paths: ["domain.interfaces", "domain.data_flows", "domain.events"] }
    required_inputs: ["completion contract", "source call graph", "source diff"]
    executor: "agent"
    blocking: true
    evidence_types: ["contract-trace", "terminal-map"]

  - id: "business-value-validator"
    tier: "recommended"
    stages: ["01-需求讨论", "02-产品文档", "08-验收表格", "09-验收", "12-复盘总结"]
    applies_when: { any_keywords: ["增长", "收入", "成本", "效率", "商业", "North Star"], contract_paths: ["outcome.north_star", "outcome.guardrails"] }
    required_inputs: ["business model", "metric definitions", "completion contract outcome"]
    executor: "agent"
    blocking: true
    evidence_types: ["metric-tree", "baseline-target-report", "outcome-readout"]

  - id: "organization-consensus-checker"
    tier: "recommended"
    stages: ["01-需求讨论", "02-产品文档", "03-技术架构", "09-验收"]
    applies_when: { any_keywords: ["跨团队", "审批", "依赖", "签收", "owner"], contract_paths: ["organization", "assumptions", "decisions"] }
    required_inputs: ["team-profile organization", "decision log", "dependency map"]
    executor: "agent"
    blocking: true
    evidence_types: ["role-matrix", "decision-log", "dependency-SLA"]

  - id: "ux-human-factor-reviewer"
    tier: "recommended"
