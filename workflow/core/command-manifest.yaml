schema_version: "1.0"
command_count: 23
commands:
  - id: "init-workspace"
    skill_slug: "workflow-init-workspace"
    title: "初始化工作区"
    description: "扫描本地资料、生成 team-profile、缺资料提问，并生成当前工具 adapter。"
    argument_hint: "<目标目录>"
    implementation_gate: false
  - id: "connect-toolchain"
    skill_slug: "workflow-connect-toolchain"
    title: "工具链连接规划"
    description: "探测或收集团队日志、构建、部署、配置、数据库等工具，生成并维护 MCP 连接计划，按执行策略推进连接。"
    argument_hint: "[工具链槽位]"
    implementation_gate: false
  - id: "new-feature"
    skill_slug: "workflow-new-feature"
    title: "初始化功能工作流"
    description: "创建 features/{feature}/ 容器、状态文件和截图目录。"
    argument_hint: "<功能名称>"
    implementation_gate: false
  - id: "define-done"
    skill_slug: "workflow-define-done"
    title: "定义完成契约"
    description: "把目标、边界、业务规则、质量预算和验收标准编译为可校验的 Completion Contract。"
    argument_hint: "<功能名称>"
    implementation_gate: false
  - id: "01-需求讨论"
    skill_slug: "workflow-01-requirement-discussion"
    title: "需求讨论"
    description: "澄清业务目标、边界、验收口径和待确认项。"
    argument_hint: "<功能名称>"
    implementation_gate: false
  - id: "02-产品文档"
    skill_slug: "workflow-02-product-document"
    title: "产品文档"
    description: "输出 PRD、业务规则、高层 UI 方向、非功能需求和验收口径。"
    argument_hint: "<功能名称>"
    implementation_gate: false
  - id: "02B-UI设计"
    skill_slug: "workflow-02b-ui-design"
    title: "UI 设计"
    description: "在产品文档后输出信息架构、关键流程、页面清单、组件规范、平台适配、可访问性和 04A 交接规范。"
    argument_hint: "<功能名称>"
    implementation_gate: false
  - id: "02C-HTML原型"
    skill_slug: "workflow-02c-html-prototype"
    title: "HTML 可点击原型"
    description: "在 02B 设计基线上，用 design tokens 与组件清单产出前端开发级的单文件可点击 HTML 原型。"
    argument_hint: "<功能名称>"
    implementation_gate: false
  - id: "03-技术架构"
    skill_slug: "workflow-03-technical-architecture"
    title: "技术架构"
    description: "识别项目族、影响仓库、调用链、分支基线和实现准入风险。"
    argument_hint: "<功能名称>"
    implementation_gate: false
  - id: "03-06-研发准备"
    skill_slug: "workflow-03-06-rd-readiness"
    title: "研发准备编排"
    description: "在已有 PRD 和必要 UI 设计基线后串联生成 03 到 06 的研发准备文档；不授权代码实现。"
    argument_hint: "<功能名称>"
    implementation_gate: false
  - id: "deliver-until-done"
    skill_slug: "workflow-deliver-until-done"
    title: "自主交付至完成"
    description: "在冻结合同和明确授权范围内执行实现、验证、修复、复验和证据记录，直到达到可证明终态或精确阻塞。"
    argument_hint: "<功能名称>"
    implementation_gate: true
  - id: "04-代码实现"
    skill_slug: "workflow-04-code-implementation"
    title: "代码实现总览"
    description: "在准入通过后记录后端、前端、配置、数据和发布影响的真实改动。"
    argument_hint: "<功能名称>"
    implementation_gate: true
  - id: "04A-前端代码实现"
    skill_slug: "workflow-04a-frontend-implementation"
    title: "前端代码实现"
    description: "记录页面、组件、接口、状态、回显和前端验证。"
    argument_hint: "<功能名称>"
    implementation_gate: true
  - id: "04B-后端代码实现"
    skill_slug: "workflow-04b-backend-implementation"
    title: "后端代码实现"
    description: "记录接口、服务、数据、事务、消息、配置和后端验证。"
    argument_hint: "<功能名称>"
    implementation_gate: true
  - id: "05-代码审查"
    skill_slug: "workflow-05-code-review"
    title: "代码审查"
    description: "以问题优先方式审查真实 diff、发布边界、PRD 一致性和残余风险。"
    argument_hint: "<功能名称>"
    implementation_gate: false
  - id: "06-测试用例"
    skill_slug: "workflow-06-test-cases"
    title: "测试用例"
    description: "输出正常流、异常流、边界流、权限和回归覆盖矩阵。"
    argument_hint: "<功能名称>"
    implementation_gate: false
  - id: "07-测试执行"
    skill_slug: "workflow-07-test-execution"
    title: "测试执行"
    description: "记录真实执行结果、证据、阻塞、缺陷和发布候选差异核查。"
    argument_hint: "<功能名称>"
    implementation_gate: false
  - id: "08-验收表格"
    skill_slug: "workflow-08-acceptance-table"
    title: "验收表格"
    description: "形成业务可签收的验收清单和责任项。"
    argument_hint: "<功能名称>"
    implementation_gate: false
  - id: "09-验收"
    skill_slug: "workflow-09-acceptance"
    title: "验收报告"
    description: "记录验收结论、遗留项、范围说明和后续动作。"
    argument_hint: "<功能名称>"
    implementation_gate: false
  - id: "10-培训文档"
    skill_slug: "workflow-10-training-document"
    title: "培训文档"
    description: "输出面向非技术人员的操作说明、截图和分发材料。"
    argument_hint: "<功能名称>"
    implementation_gate: false
  - id: "11-上线邮件通知"
    skill_slug: "workflow-11-launch-notice"
    title: "上线通知"
    description: "形成上线范围、影响、时间、回滚口径和注意事项。"
    argument_hint: "<功能名称>"
    implementation_gate: false
  - id: "12-复盘总结"
    skill_slug: "workflow-12-retrospective"
    title: "复盘总结"
    description: "沉淀项目级结论、通用规则候选和工作流改进项。"
    argument_hint: "<功能名称>"
    implementation_gate: false
  - id: "workflow-status"
    skill_slug: "workflow-status"
    title: "工作流状态"
    description: "汇总 features 下所有需求的阶段状态、阻塞和下一步。"
    argument_hint: "[功能名称]"
    implementation_gate: false
