acceptance:
  - id: "AC-001"
    title: "确定性自动验证通过"
    priority: "P0"
    blocking: true
    human_gate: false
    requirement_refs:
      - "REQ-001"
    risk_refs: []
    dimensions:
      - "functional"
      - "negative-boundary"
      - "permissions"
      - "recovery"
      - "regression"
    given: "代码与依赖已安装在受控测试环境"
    when: "执行项目的确定性验证命令"
    then: "命令退出码为 0，且 100% blocking assertions 通过"
    threshold: "退出码 = 0 且 assertions pass rate = 100%"
    environment:
      name: "<TODO: 非生产受控环境名>"
    fixture:
      dataset: "<TODO: 固定 fixture/dataset 版本，或 N/A: reason>"
    freshness:
      max_age_minutes: 60
    evidence_required:
      - "退出码、断言摘要、contract/source/environment fingerprint 与 hash-chain entry"
    oracle:
      type: "command"
      command: "npm"
      args:
        - "test"
      cwd: "."
      timeout_ms: 120000
      expected_exit_code: 0
      integrity_paths:
        - "package.json"
        - "test"
      integrity_fingerprint: "<TODO: check-completion-contract 前计算 integrity_paths 的 sha256 fingerprint>"
    waiver:
      allowed: false
      approvers: []
      scopes: []
  - id: "AC-002"
    title: "有权角色完成人工签收"
    priority: "P0"
    blocking: true
    human_gate: true
    requirement_refs:
      - "REQ-002"
    risk_refs: []
    dimensions:
      - "functional"
    given: "所有自动化 blocking AC 已在当前 contract/source/environment 下满足"
    when: "有权验收人按真实目标场景逐项执行验收 rubric"
    then: "rubric 的 100% 项目均明确签收，未签收项不得由 Agent 代判"
    threshold: "rubric pass rate = 100%"
    environment:
      name: "<TODO: 真实目标场景或受控验收环境>"
    fixture:
      scenario: "<TODO: 验收任务与账号/数据前置，或 N/A: reason>"
    freshness:
      max_age_minutes: 1440
    evidence_required:
      - "验收人、时间、环境、逐项结论与签收记录"
    oracle:
      type: "manual"
      rubric:
        - "交付结果符合 feature objective、non-goals 与 preserved invariants"
        - "体验、商业、组织或合规等不可自动证明的判断已由有权角色签收"
    waiver:
      allowed: false
      approvers: []
      scopes: []

autonomy:
  allowed_actions:
    - "oracle:command"
    - "oracle:file"
  forbidden_actions:
    - "contract:mutate"
    - "remote:write"
    - "production:write"
  ask_before:
    - "external:side-effect"
  oracle_env_allowlist:
    - "PATH"
    - "TMPDIR"
    - "TMP"
    - "TEMP"
    - "LANG"
    - "LC_ALL"
    - "CI"
    - "SystemRoot"
    - "PATHEXT"
  max_iterations: 8
  max_elapsed_minutes: 180
  max_command_executions: 32
  max_cost_units: 100
  cost_unit: "externally supplied execution cost unit"
  cost_per_execution: 1
  max_diff_lines: 1200
  max_same_failure: 2
  max_no_progress: 2
  flaky_policy:
    rule: "同一快照重复结果不一致时 BLOCK，不以重跑取最好结果"
    same_snapshot_conflict: "BLOCK"
    max_rechecks: 0
  retry_policy:
    rule: "只重试 contract 明确允许的暂态失败；永久失败和断言失败不自动重试"
    max_attempts: 1
    retryable_reasons: []
  checkpoint:
    path: "features/{feature}/completion/run-state.yaml"
    resume: "contract/environment/base/source 不匹配时拒绝续跑"
    integrity_required: true
    ledger_head_required: true
  stop_condition_codes:
    - "budget_exhausted"
    - "scope_violation"
    - "contract_change_required"
    - "approval_required"
    - "repeated_failure"
    - "no_progress"
    - "execution_permit_expired"
  stop_conditions:
    - "需要修改已冻结的完成契约或验收阈值"
    - "需要未授权的高风险写操作或外部审批"
    - "同一失败指纹重复达到上限，或 blocking failure 连续两轮没有下降"
    - "任一时间、命令次数、diff 或迭代预算耗尽"
    - "Owner execution permit 在运行开始前或任一 Oracle/remediation 边界到期"

governance:
  status: "draft"
  change_approval:
    rule: "冻结后，目标、scope、blocking、threshold、oracle、waiver 的修改必须由 approver 批准并递增 contract_version"
  evidence_invalidation:
    rule: "contract/source/environment/artifact 改变时，相关旧证据必须变为 STALE"
  waiver_policy:
    rule: "只有 criterion.waiver.allowed=true 且批准人、scope、补偿控制和期限均匹配时，WAIVED 才可满足 gate；WAIVED 永不计入 PASS"
  anti_cheating:
    rule: "Agent 不得删除/跳过失败用例、降低阈值、扩大 mock/scope/waiver，或把 NOT_RUN/STALE/WAIVED 改写成 PASS"
  evidence_attestation:
    required_for_success: true
    automation_key_ids:
      - "automation-local-v1"
    human_key_ids:
      - "human-owner-v1"
    waiver_key_ids:
      - "human-owner-v1"
    key_principals:
      automation-local-v1:
        role: "automation"
        principal: "local-runner"
      human-owner-v1:
        role: "human"
        principal: "<TODO: 与 approvers 中真实签收角色一致>"
  findings_registry:
    required_for_completion: true
    owner: "<TODO: finding registry Owner>"
    source: "<TODO: code review / defect tracker / risk register 的唯一快照来源>"
    max_age_minutes: 1440
  ledger_anchor:
    required_for_acceptance: true
    external_anchor_owner: "<TODO: 保存和核对 ledger head/count 的独立 Owner>"
    storage: "<TODO: agent 工作区之外的不可变 CI artifact、透明日志或签名记录>"
    key_id: "owner-ledger-v1"
    trusted_public_key_sha256: "<TODO: sha256 of Owner-controlled Ed25519 public key PEM>"
    max_age_minutes: 1440
  execution_authorization:
    permit_required: true
    key_id: "owner-execution-v1"
    trusted_public_key_sha256: "<TODO: sha256 of Owner-controlled Ed25519 public key PEM>"
    max_validity_minutes: 1440
  blocking_rules_acknowledged:
    - "standard"
