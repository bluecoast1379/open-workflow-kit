# 仓库内只记请求策略，不是信任根；生效值取 core、外部受信策略、仓库请求、当次授权中最严格值。
execution_policy:
  requested_default_mode: "ask"
  requested_categories:
    remote_git: { mode: "ask" }
    branch_creation: { mode: "ask" }
    push_tag_merge: { mode: "ask" }
    protected_branch_write: { mode: "ask" }
    db_ddl: { mode: "ask" }
    db_dml: { mode: "ask" }
    production_config_write: { mode: "ask" }
    build_deploy_trigger: { mode: "ask" }
    package_publish: { mode: "ask" }
    config_write: { mode: "ask" }
  external_trust_policy:
    required_for_auto: true
    source_env: "OPEN_WORKFLOW_TRUST_POLICY"
  non_repo_auto_categories:
    - "protected_branch_write"
    - "db_ddl"
    - "db_dml"
    - "production_config_write"
    - "build_deploy_trigger"
    - "package_publish"
  risk_statement_required: true
  audit_log: "workflow/local/execution-audit.jsonl"

toolchain:
  runtime_logs: { label: "运行日志", detected: false, tools: [], evidence: [], status: "pending-question" }
  ci_cd: { label: "CI/CD 流水线", detected: false, tools: [], evidence: [], status: "pending-question" }
  deploy_runtime: { label: "部署运行态", detected: false, tools: [], evidence: [], status: "pending-question" }
  config_center: { label: "配置中心", detected: false, tools: [], evidence: [], status: "pending-question" }
  database: { label: "数据库查询", detected: false, tools: [], evidence: [], status: "pending-question" }
  git_platform: { label: "代码托管平台", detected: false, tools: [], evidence: [], status: "pending-question" }

testing:
  api_track:
    credentials_file: "workflow/local/test-credentials.env"
    environment_allowlist: []
    production_targets: "blocked"
  ui_track:
    browser_automation: "<TODO: playwright-mcp | tool-native | none>"
    miniprogram_automation: "disabled"
    evidence_dir: "features/{feature}/screenshots"
  reproducibility:
    fixture_version_required: true
    random_seed_required: true
    environment_fingerprint_required: true
    flaky_policy: "quarantine-does-not-pass"

quality_budgets:
  performance:
    latency_percentiles: { p50_ms: null, p95_ms: null, p99_ms: null }
    throughput: null
    resource_limits: { memory_mb: null, cpu_percent: null, battery: null, network_bytes: null }
  reliability:
    availability_target: null
    error_budget: null
    rto: null
    rpo: null
  cost:
    per_operation: null
    monthly: null
    currency: null
  accessibility:
    standard: "<TODO: WCAG 2.2 AA | platform standard | N/A>"
  ai_quality:
    enabled: false
    golden_dataset: null
    model_and_prompt_version_required: true
    max_hallucination_rate: null
    safety_refusal_target: null
    max_cost_per_evaluation: null

completion_contract:
  path_pattern: "features/{feature}/completion/contract.yaml"
  evidence_ledger_pattern: "features/{feature}/completion/evidence/ledger.jsonl"
  run_state_pattern: "features/{feature}/completion/run-state.yaml"
  acceptance_id_pattern: "AC-[0-9]{3,}"
  evidence_statuses: ["PASS", "FAIL", "BLOCKED", "NOT_RUN", "STALE", "WAIVED"]
  require_definition_lint: true
  require_source_fingerprint: true
  require_environment_fingerprint: true
  invalidate_evidence_on_contract_change: true
  invalidate_evidence_on_source_change: true
  anti_cheating:
    forbid_threshold_weakening: true
    forbid_test_deletion_to_pass: true
    forbid_not_run_as_pass: true
    forbid_silent_scope_expansion: true
    require_waiver_expiry: true

risk_policy:
  default_profile: "standard"
  policy_packs: []
  ci_workflow_changes: "manual-review-required"
  cd_workflow_changes: "manual-review-required"
  auto_deploy_before_first_prod_release: "blocked"
  production_deployments: "manual-approval-required-until-guarded-auto-approved"
  high_risk_files:
    - "ci/**"
    - "cd/**"
    - "deploy/**"
    - "*.env*"
    - "application*.yml"
    - "application*.yaml"
    - "bootstrap*.yml"
    - "bootstrap*.yaml"
    - "pom.xml"
    - "package.json"
    - "lockfiles"

workflow:
  features_dir: "features"
  core_dir: "workflow/core"
  adapters_dir: "workflow/adapters"
  require_stage_gate_for_code: true
  require_feature_branch_for_code: true
  same_repo_parallel_policy: "worktree-required-after-implementation-stage"
